<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión · GESLASOFT</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body>

  <div class="login-page">
    <div class="login-wrapper">

      <!-- BRAND -->
      <div class="login-brand">
        <div class="login-logo">
          <img src="../assets/logo_geslasoft.png" alt="GESLASOFT"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round"
               style="display:none">
            <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4
                     M9 3v18m0 0h10a2 2 0 0 0 2-2v-4
                     M9 21H5a2 2 0 0 1-2-2v-4m0 0h18"/>
          </svg>
        </div>
        <div>
          <div class="login-title">GESLASOFT</div>
          <div class="login-subtitle">Sistema de Gestión de Laboratorio de Ensayo</div>
        </div>
      </div>

      <!-- CARD -->
      <div class="login-card">
        <div class="login-card-heading">
          <div class="login-card-title">Iniciar sesión</div>
          <div class="login-card-desc">Ingresa tus credenciales para continuar</div>
        </div>

        <!-- ERROR GLOBAL -->
        <div class="login-error" id="loginError">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="loginErrorMsg">Correo o contraseña incorrectos</span>
        </div>

        <!-- EMAIL -->
        <div class="field">
          <label for="email">Correo electrónico</label>
          <div class="input-icon-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" id="email"
                   placeholder="usuario@laboratorio.com"
                   autocomplete="email" />
          </div>
          <span class="field-error" id="emailError">Ingresa un correo válido</span>
        </div>

        <!-- CONTRASEÑA -->
        <div class="field">
          <label for="password">Contraseña</label>
          <div class="input-icon-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password"
                   placeholder="••••••••"
                   autocomplete="current-password"
                   style="padding-right: 42px;" />
            <button type="button" class="btn-toggle-pass" id="btnTogglePass"
                    aria-label="Mostrar contraseña">
              <svg id="iconOjo" width="16" height="16" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="passwordError">Ingresa tu contraseña</span>
        </div>

        <!-- BOTÓN INGRESAR -->
        <button type="button" class="btn-primary" id="btnLogin">
          <div class="btn-spinner" id="btnSpinner"></div>
          <span class="btn-label">Ingresar</span>
        </button>

        <!-- DIVISOR -->
        <div class="login-divider">o</div>

        <!-- SIN CUENTA -->
        <a href="laboratorios.html" class="btn-sin-cuenta">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 17l5-5-5-5"/>
            <path d="M21 12H9"/>
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          </svg>
          Continuar sin cuenta
        </a>
      </div>

      <!-- FOOTER -->
      <div class="login-footer">
        GESLASOFT · LIMS · ISO 17025
      </div>

    </div>
  </div>

  <script>
    // ── CONFIGURACIÓN SUPABASE ──
    const SUPABASE_URL  = 'https://aahisaouszyvcqhgzssx.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhaGlzYW91c3p5dmNxaGd6c3N4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4Njg3NjgsImV4cCI6MjA5MjQ0NDc2OH0.6oJ9SSIX8C7DkFmhgZ3p-YZYHYu-eF9S3wlzAqmKFqY';

    const HEADERS = {
      'apikey':        SUPABASE_ANON,
      'Authorization': `Bearer ${SUPABASE_ANON}`,
      'Content-Type':  'application/json',
    };

    // ── DOM ──
    const inputEmail    = document.getElementById('email');
    const inputPassword = document.getElementById('password');
    const btnLogin      = document.getElementById('btnLogin');
    const btnSpinner    = document.getElementById('btnSpinner');
    const loginError    = document.getElementById('loginError');
    const loginErrorMsg = document.getElementById('loginErrorMsg');
    const emailError    = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const btnTogglePass = document.getElementById('btnTogglePass');
    const iconOjo       = document.getElementById('iconOjo');

    // ── TOGGLE CONTRASEÑA ──
    btnTogglePass.addEventListener('click', () => {
      const esPassword = inputPassword.type === 'password';
      inputPassword.type = esPassword ? 'text' : 'password';
      iconOjo.innerHTML = esPassword
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8
             a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4
             c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07
             a3 3 0 1 1-4.24-4.24"/>
           <line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
           <circle cx="12" cy="12" r="3"/>`;
    });

    // ── LIMPIAR ERRORES AL ESCRIBIR ──
    inputEmail.addEventListener('input', () => {
      inputEmail.classList.remove('invalid');
      emailError.classList.remove('visible');
      loginError.classList.remove('visible');
    });
    inputPassword.addEventListener('input', () => {
      inputPassword.classList.remove('invalid');
      passwordError.classList.remove('visible');
      loginError.classList.remove('visible');
    });

    // ── ENTER para ingresar ──
    inputPassword.addEventListener('keydown', e => {
      if (e.key === 'Enter') iniciarSesion();
    });
    inputEmail.addEventListener('keydown', e => {
      if (e.key === 'Enter') inputPassword.focus();
    });

    // ── VALIDACIÓN ──
    function validar() {
      let ok = true;
      const email = inputEmail.value.trim();
      const pass  = inputPassword.value;

      if (!email || !email.includes('@') || !email.includes('.')) {
        inputEmail.classList.add('invalid');
        emailError.classList.add('visible');
        ok = false;
      }
      if (!pass) {
        inputPassword.classList.add('invalid');
        passwordError.classList.add('visible');
        ok = false;
      }
      return ok;
    }

    // ── MOSTRAR ERROR GLOBAL ──
    function mostrarError(msg) {
      loginErrorMsg.textContent = msg;
      loginError.classList.add('visible');
    }

    // ── LOADING STATE ──
    function setLoading(loading) {
      btnLogin.disabled = loading;
      btnLogin.classList.toggle('loading', loading);
    }

    // ── INICIAR SESIÓN ──
    async function iniciarSesion() {
      if (!validar()) return;
      setLoading(true);
      loginError.classList.remove('visible');

      try {
        // 1. Autenticar con Supabase Auth
        const authRes = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
          method: 'POST',
          headers: { 'apikey': SUPABASE_ANON, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: inputEmail.value.trim(),
            password: inputPassword.value,
          }),
        });

        const authData = await authRes.json();
        if (!authRes.ok) {
          mostrarError('Correo o contraseña incorrectos');
          return;
        }

        const token   = authData.access_token;
        const user_id = authData.user.id;

        // Guardar token en sessionStorage
        sessionStorage.setItem('geslasoft_token',   token);
        sessionStorage.setItem('geslasoft_user_id', user_id);

        // 2. Buscar perfil del usuario en tabla usuarios
        const usuarioRes = await fetch(

          `${SUPABASE_URL}/rest/v1/usuarios?id=eq.${user_id}&select=id,nombre_completo,nombre_corto,organizacion_id,laboratorio_id,rol_id,es_superadmin_geslasoft,activo,roles(codigo,nombre)`,
          { headers: { ...HEADERS, 'Authorization': `Bearer ${token}` } }
        );
        const usuarios = await usuarioRes.json();

        if (!usuarios.length) {
          mostrarError('Usuario no encontrado en el sistema.');
          return;
        }

        const usuario = usuarios[0];

        if (!usuario.activo) {
          mostrarError('Tu cuenta está desactivada. Contacta al administrador.');
          return;
        }

        // Guardar datos de sesión
        sessionStorage.setItem('geslasoft_usuario', JSON.stringify(usuario));

        // 3. Redirigir según rol
        const rolCodigo = usuario.roles?.codigo || '';
        const esSuperadmin = usuario.es_superadmin_geslasoft;

        if (esSuperadmin || rolCodigo !== 'cliente_externo') {
          window.location.href = 'panel_lab.html';
        } else {
          window.location.href = 'mis_solicitudes.html';
        }

      } catch (err) {
        console.error(err);
        mostrarError('Error de conexión. Intenta de nuevo.');
      } finally {
        setLoading(false);
      }
    }

    // ── CLICK BOTÓN ──
    btnLogin.addEventListener('click', iniciarSesion);
  </script>

</body>
</html>
