<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solicitudes · GESLASOFT</title>
  <link rel="stylesheet" href="../../css/base.css" />
  <link rel="stylesheet" href="../../css/requerimiento.css" />
</head>
<body>

<div class="req-page">

  <!-- ── HEADER ── -->
  <header class="panel-header">

    <!-- Brand -->
    <div class="panel-header-brand">
      <div class="panel-header-logo">
        <img src="../../assets/logo_geslasoft.png" alt="GESLASOFT"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round"
             style="display:none">
          <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4
                   M9 3v18m0 0h10a2 2 0 0 0 2-2v-4
                   M9 21H5a2 2 0 0 1-2-2v-4m0 0h18"/>
        </svg>
      </div>
      <div>
        <div class="panel-brand-name">GESLASOFT</div>
        <div class="panel-brand-sub">LIMS · ISO 17025</div>
      </div>
    </div>

    <div class="panel-header-divider"></div>

    <!-- Título del módulo -->
    <div class="header-module-info">
      <div class="header-module-title">Solicitudes</div>
      <div class="header-module-sub">Solicitudes registradas · orden descendente</div>
    </div>

    <!-- Usuario + volver -->
    <div class="panel-header-right">
      <div class="panel-usuario-badge">
        <div class="panel-usuario-avatar" id="usuarioAvatar">?</div>
        <div>
          <div class="panel-usuario-nombre" id="usuarioNombre">—</div>
          <div class="panel-usuario-rol" id="usuarioRol">—</div>
        </div>
      </div>
      <a href="../panel_lab.html" class="btn-volver">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Volver
      </a>
    </div>

  </header>

  <!-- ── CONTENIDO ── -->
  <main class="req-content">

    <!-- CARGANDO -->
    <div class="req-loading" id="estadoCargando">
      <div class="req-spinner"></div>
      <span>Cargando solicitudes...</span>
    </div>

    <!-- CONTENIDO REAL -->
    <div id="reqContenido" style="display:none; flex-direction:column; gap:16px;">

      <!-- FILTROS -->
      <div class="filtros-bar">

        <!-- Buscador -->
        <div class="filtro-search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="filtroBusqueda"
                 placeholder="Buscar por solicitante, empresa o N°..." />
        </div>

        <!-- Filtro estado -->
        <div class="filtro-select">
          <select id="filtroEstado">
            <option value="">Todos los estados</option>
            <option value="pendiente">Pendiente</option>
            <option value="aprobado">Aprobado</option>
            <option value="rechazado">Rechazado</option>
          </select>
        </div>

        <!-- Filtro año -->
        <div class="filtro-select">
          <select id="filtroAnio">
            <option value="">Todos los años</option>
          </select>
        </div>

        <span class="filtros-count" id="filtrosCount">—</span>
      </div>

      <!-- LISTA -->
      <div class="solicitudes-lista" id="solicitudesLista"></div>

      <!-- ESTADO VACÍO -->
      <div class="req-empty" id="estadoVacio" style="display:none;">
        <div class="req-empty-icon">📋</div>
        <div class="req-empty-title">Sin solicitudes</div>
        <div class="req-empty-sub">No se encontraron solicitudes con los filtros aplicados.</div>
      </div>

    </div>

  </main>

</div>

<!-- FAB NUEVA SOLICITUD -->
<a href="../sin_cuenta/formulario.html" class="fab-nueva">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2.5"
       stroke-linecap="round" stroke-linejoin="round">
    <line x1="12" y1="5" x2="12" y2="19"/>
    <line x1="5" y1="12" x2="19" y2="12"/>
  </svg>
  <span>Nueva Solicitud</span>
</a>

<!-- TOAST -->
<div class="toast-msg" id="toastMsg"></div>

<script src="../../js/requerimiento.js"></script>

</body>
</html>
