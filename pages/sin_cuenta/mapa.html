<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa de Laboratorios — Geslasoft</title>
  <link rel="stylesheet" href="../../css/base.css" />
  <link rel="stylesheet" href="../../css/mapa.css" />
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="app-header">
    <button class="btn-back" onclick="history.back()" aria-label="Volver">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <div class="header-titles">
      <span class="header-title">Laboratorios Acreditados</span>
      <span class="header-sub">Directorio nacional</span>
    </div>
    <!-- TOGGLE VISTA -->
    <div class="vista-toggle">
      <a href="laboratorios.html" class="vista-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6"  x2="21" y2="6"/>
          <line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6"  x2="3.01" y2="6"/>
          <line x1="3" y1="12" x2="3.01" y2="12"/>
          <line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        Lista
      </a>
      <a href="mapa.html" class="vista-btn vista-btn--active">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
          <line x1="9"  y1="3"  x2="9"  y2="18"/>
          <line x1="15" y1="6"  x2="15" y2="21"/>
        </svg>
        Mapa
      </a>
    </div>
  </header>

  <!-- BARRA DE FILTRO RÁPIDO -->
  <div class="mapa-filtros">
    <div class="search-wrap mapa-search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
           stroke="var(--text-sub)" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="mapaFiltro" placeholder="Buscar laboratorio o método..." />
    </div>
    <div class="mapa-filtros-fila2">
      <div class="tabs-acreditacion">
        <button class="tab-btn tab-btn--active" data-filtro="todos">Todos</button>
        <button class="tab-btn" data-filtro="acreditados">Acreditados</button>
        <button class="tab-btn" data-filtro="no_acreditados">No acreditados</button>
      </div>
      <button type="button" class="btn-cercademi" id="btnCercaDeMi">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
        </svg>
        Cerca de mí
      </button>
    </div>
  </div>

  <!-- MAPA -->
  <div id="mapa"></div>

  <!-- CONTADOR -->
  <div id="mapaCount" class="mapa-count hidden">
    <span id="mapaCountText">0 laboratorios</span>
  </div>

  <!-- PANEL LATERAL: detalle del marcador -->
  <div id="panelDetalle" class="panel-detalle hidden">
    <button class="panel-cerrar" id="btnCerrarPanel">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <div id="panelContenido"></div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="../../js/mapa.js"></script>
</body>
</html>
