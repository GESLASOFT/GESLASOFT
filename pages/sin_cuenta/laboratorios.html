<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Laboratorios</title>
  <link rel="stylesheet" href="../../css/base.css" />
  <link rel="stylesheet" href="../../css/laboratorios.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="app-header">
    <button class="btn-back" onclick="history.back()" aria-label="Volver">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <div class="header-titles">
      <span class="header-title">Laboratorios Acreditados</span>
      <span class="header-sub">Directorio nacional</span>
    </div>
    <div class="vista-toggle">
      <a href="laboratorios.html" class="vista-btn vista-btn--active">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6"  x2="21" y2="6"/>
          <line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6"  x2="3.01" y2="6"/>
          <line x1="3" y1="12" x2="3.01" y2="12"/>
          <line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        Lista
      </a>
      <a href="mapa.html" class="vista-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
          <line x1="9"  y1="3"  x2="9"  y2="18"/>
          <line x1="15" y1="6"  x2="15" y2="21"/>
        </svg>
        Mapa
      </a>
    </div>
  </header>

  <main class="form-container">

    <!-- CARD FILTROS ACORDEÓN -->
    <div class="card">
      <div class="card-header">
        <svg class="card-icon" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
        </svg>
        <span>Filtrar laboratorios</span>
        <span id="filtrosActivosCount" class="filtros-activos-badge hidden">0</span>
      </div>

      <!-- ── PASO 1: BÚSQUEDA ── -->
      <div class="acordeon-item" id="paso1">
        <button type="button" class="acordeon-header" data-paso="paso1">
          <span class="acordeon-titulo">
            <span class="step-badge">1</span>
            Por nombre, código o descripción
          </span>
          <span class="acordeon-indicador" id="ind1"></span>
          <svg class="acordeon-chevron" width="14" height="14" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div class="acordeon-body">
          <div class="field search-field">
            <label for="filBusqueda">Nombre de empresa, código o descripción</label>
            <div class="search-wrap">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                   stroke="var(--text-sub)" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              <input type="text" id="filBusqueda"
                     placeholder="Ej: LabTest SAC, ASTM D422, granulometría..." />
            </div>
          </div>
        </div>
      </div>

      <!-- ── PASO 2: UBICACIÓN ── -->
      <div class="acordeon-item" id="paso2">
        <button type="button" class="acordeon-header" data-paso="paso2">
          <span class="acordeon-titulo">
            <span class="step-badge">2</span>
            Por ubicación
          </span>
          <span class="acordeon-indicador" id="ind2"></span>
          <svg class="acordeon-chevron" width="14" height="14" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div class="acordeon-body">
          <div class="field">
            <label for="filDepartamento">Departamento</label>
            <select id="filDepartamento">
              <option value="">Todos los departamentos</option>
            </select>
          </div>
          <div class="field">
            <label for="filProvincia">Provincia</label>
            <select id="filProvincia" disabled>
              <option value="">Todas las provincias</option>
            </select>
          </div>
          <div class="field">
            <label for="filDistrito">Distrito</label>
            <select id="filDistrito" disabled>
              <option value="">Todos los distritos</option>
            </select>
          </div>
        </div>
      </div>

      <!-- ── PASO 3: ACREDITACIÓN ── -->
      <div class="acordeon-item" id="paso3">
        <button type="button" class="acordeon-header" data-paso="paso3">
          <span class="acordeon-titulo">
            <span class="step-badge">3</span>
            Por estado de acreditación
          </span>
          <span class="acordeon-indicador" id="ind3"></span>
          <svg class="acordeon-chevron" width="14" height="14" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div class="acordeon-body">
          <div class="tabs-acreditacion">
            <button class="tab-btn tab-btn--active" data-filtro="todos">Todos</button>
            <button class="tab-btn" data-filtro="acreditado">Acreditados</button>
            <button class="tab-btn" data-filtro="no_acreditado">No acreditados</button>
            <button class="tab-btn" data-filtro="suspendido">Suspendidos</button>
            <button class="tab-btn" data-filtro="en_proceso">En proceso</button>
          </div>
        </div>
      </div>

      <!-- ── BOTÓN LIMPIAR ── -->
      <div style="padding: 10px 16px 14px;">
        <button type="button" class="btn-outline" id="btnLimpiar"
                style="font-size:13px; padding:9px 16px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
          Limpiar filtros
        </button>
      </div>

    </div>

    <!-- RESULTADOS -->
    <div id="resultadosHeader" class="resultados-header hidden">
      <span id="resultadosCount">0 laboratorios encontrados</span>
    </div>

    <!-- ESTADO: CARGANDO -->
    <div id="estadoCargando" class="estado-cargando">
      <div class="spinner"></div>
      <p>Cargando laboratorios...</p>
    </div>

    <!-- ESTADO: SIN RESULTADOS -->
    <div id="estadoVacio" class="estado-vacio hidden">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none"
           stroke="var(--text-sub)" stroke-width="1.5"
           stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <p>No se encontraron laboratorios<br>con esos criterios.</p>
    </div>

    <!-- LISTA DE CARDS -->
    <div id="listaLabs"></div>

  </main>

  <script src="../../js/laboratorios.js"></script>
  <script>
    // ── ACORDEÓN ──
    document.querySelectorAll('.acordeon-header').forEach(btn => {
      btn.addEventListener('click', () => {
        const item = document.getElementById(btn.dataset.paso);
        item.classList.toggle('acordeon-item--open');
      });
    });

    // ── INDICADORES DE FILTRO ACTIVO ──
    function actualizarIndicadores() {
      // Paso 1: búsqueda
      const busq = document.getElementById('filBusqueda').value.trim();
      const ind1 = document.getElementById('ind1');
      ind1.textContent = busq ? '●' : '';
      ind1.classList.toggle('hidden', !busq);

      // Paso 2: ubicación
      const dep  = document.getElementById('filDepartamento').value;
      const prov = document.getElementById('filProvincia').value;
      const dist = document.getElementById('filDistrito').value;
      const ind2 = document.getElementById('ind2');
      const ubicActiva = dep || prov || dist;
      ind2.textContent = ubicActiva ? '●' : '';
      ind2.classList.toggle('hidden', !ubicActiva);

      // Paso 3: acreditación
      const acredActiva = document.querySelector('.tab-btn--active')?.dataset.filtro !== 'todos';
      const ind3 = document.getElementById('ind3');
      ind3.textContent = acredActiva ? '●' : '';
      ind3.classList.toggle('hidden', !acredActiva);

      // Badge total
      const total = [busq, ubicActiva, acredActiva].filter(Boolean).length;
      const badge = document.getElementById('filtrosActivosCount');
      badge.textContent = total;
      badge.classList.toggle('hidden', total === 0);
    }

    // Escuchar cambios para actualizar indicadores
    document.getElementById('filBusqueda').addEventListener('input', actualizarIndicadores);
    document.getElementById('filDepartamento').addEventListener('change', actualizarIndicadores);
    document.getElementById('filProvincia').addEventListener('change', actualizarIndicadores);
    document.getElementById('filDistrito').addEventListener('change', actualizarIndicadores);
    document.querySelectorAll('.tab-btn').forEach(b =>
      b.addEventListener('click', actualizarIndicadores)
    );
    document.getElementById('btnLimpiar').addEventListener('click', actualizarIndicadores);
  </script>
</body>
</html>
