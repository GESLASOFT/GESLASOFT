<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GESLASOFT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
</head>
  
<body class="splash">

  <canvas id="particles-canvas"></canvas>

  <div class="splash-container">

    <div class="brand-block">
      <div class="logo-wordmark">
        <span class="logo-prefix">GES</span><span class="logo-accent">LA</span><span class="logo-suffix">SOFT</span>
      </div>
      <div class="logo-rule"></div>
    </div>

    <div class="loader-block">
      <svg class="spinner" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
        <circle class="spinner-track" cx="25" cy="25" r="20" />
        <circle class="spinner-arc"   cx="25" cy="25" r="20" />
      </svg>
    </div>

    <footer class="splash-footer">
      <p class="tagline">Sistema de Gestión de Laboratorio</p>
      <p class="standard">ISO/IEC 17025</p>
    </footer>

  </div>

  <script>
    // ── PARTÍCULAS ──
    const canvas    = document.getElementById('particles-canvas');
    const ctx       = canvas.getContext('2d');
    const esModoOscuro = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const colorParticula = esModoOscuro ? '79,195,247' : '0,137,123';
    let W, H, particles;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function initParticles(n = 55) {
      particles = Array.from({ length: n }, () => ({
        x:  Math.random() * W,
        y:  Math.random() * H,
        vx: (Math.random() - 0.5) * 0.35,
        vy: (Math.random() - 0.5) * 0.35,
        r:  Math.random() * 1.4 + 0.4,
        a:  Math.random() * 0.35 + 0.08,
      }));
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // líneas de conexión
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx   = particles[i].x - particles[j].x;
          const dy   = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(${colorParticula},${0.12 * (1 - dist / 120)})`;
            ctx.lineWidth   = 0.6;
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }

      // puntos
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0) p.x = W;
        if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H;
        if (p.y > H) p.y = 0;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${colorParticula},${p.a})`;
        ctx.fill();
      });

      requestAnimationFrame(draw);
    }

    resize();
    initParticles();
    draw();
    window.addEventListener('resize', () => { resize(); initParticles(); });

    // ── REDIRECCIÓN (1.8 s) ──
    setTimeout(() => {
      document.body.classList.add('leaving');
      setTimeout(() => {
        window.location.href = 'pages/login.html';
      }, 400);
    }, 2800);
  </script>

</body>
</html>
