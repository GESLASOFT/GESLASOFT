<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Laboratorios</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="laboratorios.css" />
</head>
<body>

  <!-- HEADER -->


  <main class="form-container">

    <!-- CARD FILTROS -->
    <div class="card">
      <div class="card-header">
        <svg class="card-icon" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
        </svg>
        <span>Filtrar laboratorios</span>
      </div>
      <div class="card-body">

        <!-- PASO 1: UBICACIÓN -->
        <p class="filter-step-label">
          <span class="step-badge">1</span> Por ubicación
        </p>

        <div class="field">
          <label for="filDepartamento">Departamento</label>
          <select id="filDepartamento">
            <option value="">Todos los departamentos</option>
          </select>
        </div>

        <div class="field">
          <label for="filProvincia">Provincia</label>
          <select id="filProvincia" disabled>
            <option value="">Todas las provincias</option>
          </select>
        </div>

        <div class="field">
          <label for="filDistrito">Distrito</label>
          <select id="filDistrito" disabled>
            <option value="">Todos los distritos</option>
          </select>
        </div>

        <div class="filter-divider"></div>

        <!-- PASO 2: MÉTODO -->
        <p class="filter-step-label">
          <span class="step-badge">2</span> Filtrar por método acreditado
        </p>

        <div class="field search-field">
          <label for="filMetodo">Norma o método</label>
          <div class="search-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="var(--text-sub)" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="filMetodo"
                   placeholder="Ej: ASTM D422, NTP 339.128..." />
          </div>
        </div>

        <div class="filter-divider"></div>

        <!-- PASO 3: ACREDITACIÓN -->
        <p class="filter-step-label">
          <span class="step-badge">3</span> Por acreditación
        </p>

        <div class="tabs-acreditacion">
          <button class="tab-btn tab-btn--active" data-filtro="todos">Todos</button>
          <button class="tab-btn" data-filtro="acreditados">Acreditados</button>
          <button class="tab-btn" data-filtro="no_acreditados">No acreditados</button>
        </div>

        <!-- BOTÓN LIMPIAR -->
        <button type="button" class="btn-outline" id="btnLimpiar"
                style="margin-top:4px; font-size:13px; padding:9px 16px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
          Limpiar filtros
        </button>

      </div>
    </div>

    <!-- RESULTADOS -->
    <div id="resultadosHeader" class="resultados-header hidden">
      <span id="resultadosCount">0 laboratorios encontrados</span>
    </div>

    <!-- ESTADO: CARGANDO -->
    <div id="estadoCargando" class="estado-cargando">
      <div class="spinner"></div>
      <p>Cargando laboratorios...</p>
    </div>

    <!-- ESTADO: SIN RESULTADOS -->
    <div id="estadoVacio" class="estado-vacio hidden">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none"
           stroke="var(--text-sub)" stroke-width="1.5"
           stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <p>No se encontraron laboratorios<br>con esos criterios.</p>
    </div>

    <!-- LISTA DE CARDS -->
    <div id="listaLabs">
      <!-- Generado por laboratorios.js -->
    </div>

  </main>

  <script src="laboratorios.js"></script>
</body>
</html>
